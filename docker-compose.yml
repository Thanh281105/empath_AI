version: "3.8"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_empathAI
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - ./qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped

  redpanda:
    image: redpandadata/redpanda:latest
    container_name: redpanda
    command:
      - redpanda start
      - --smp 1
      - --memory 512M
      - --overprovisioned
      - --node-id 0
      - --kafka-addr PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
      - --pandaproxy-addr 0.0.0.0:8082
      - --advertise-pandaproxy-addr localhost:8082
    ports:
      - "9092:9092"       # Kafka API
      - "29092:29092"     # Internal Kafka
      - "8082:8082"       # HTTP Proxy
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    restart: unless-stopped

  redpanda-console:
    image: redpandadata/console:latest
    container_name: redpanda-console
    ports:
      - "8888:8080"
    environment:
      - KAFKA_BROKERS=redpanda:29092
    depends_on:
      - redpanda
    restart: unless-stopped

  req1_llm_only:
    image: python:3.11-slim
    container_name: req1_llm_only
    working_dir: /workspace/req1_llm_only
    volumes:
      - .:/workspace:ro
    ports:
      - "8001:8001"
    environment:
      - REQ1_PORT=8001
    command: >
      sh -c "pip install -q -r /workspace/req1_llm_only/requirements.txt &&
             uvicorn server:app --host 0.0.0.0 --port 8001 --app-dir /workspace/req1_llm_only"
    restart: unless-stopped

  req2_llm_finetune:
    image: python:3.11-slim
    container_name: req2_llm_finetune
    working_dir: /workspace/req2_llm_finetune
    volumes:
      - .:/workspace:ro
    ports:
      - "8002:8002"
    environment:
      - REQ2_PORT=8002
      - EMPATHY_MODE=groq
    command: >
      sh -c "pip install -q -r /workspace/req2_llm_finetune/requirements.txt &&
             uvicorn server:app --host 0.0.0.0 --port 8002 --app-dir /workspace/req2_llm_finetune"
    restart: unless-stopped

  req3_llm_rag:
    image: python:3.11-slim
    container_name: req3_llm_rag
    working_dir: /workspace/req3_llm_rag
    volumes:
      - .:/workspace:ro
      - ./qdrant_storage:/qdrant/storage:ro
    ports:
      - "8003:8003"
    environment:
      - REQ3_PORT=8003
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      - qdrant
    command: >
      sh -c "pip install -q -r /workspace/req3_llm_rag/requirements.txt &&
             uvicorn server:app --host 0.0.0.0 --port 8003 --app-dir /workspace/req3_llm_rag"
    restart: unless-stopped

volumes:
  redpanda_data:
